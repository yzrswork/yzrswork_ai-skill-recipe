<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TR-808</title>
<style>
:root{
  --terracotta:#b5451b;
  --terracotta-deep:#8f3413;
  --terracotta-dark:#5e2410;
  --casing:#241d18;
  --cream:#f4e9d8;
  --ink:#1c1a16;
  --red:#c73e3e;
  --orange:#d96f3d;
  --yellow:#e8c547;
  --ivory:#f0ebe3;
  --blue:#2f6fd0;
  --blue-text:#1d5fc2;
}
.back-btn{position:fixed;top:16px;left:16px;z-index:999;color:rgba(244,233,216,0.45);text-decoration:none;font-family:'DM Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}
.back-btn:hover{color:rgba(244,233,216,0.85);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--casing);font-family:-apple-system,"SF Pro",system-ui,sans-serif;user-select:none;-webkit-user-select:none;overscroll-behavior:none;}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#landscape-warn{display:none;position:fixed;inset:0;background:var(--terracotta);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--cream);font-size:24px;text-align:center;}
@media (orientation:landscape) and (max-height:500px){#landscape-warn{display:flex;}}
#app{flex:1;display:flex;min-height:0;}
#side-left,#side-right{width:12px;background:linear-gradient(180deg,#2e251e,#1a140f);flex-shrink:0;}
#main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:linear-gradient(180deg,var(--terracotta) 0%,var(--terracotta-deep) 100%);}
#header{height:56px;background:var(--casing);display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;position:relative;}
#header::after{content:'';position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,var(--red) 0 25%,var(--orange) 25% 50%,var(--yellow) 50% 75%,var(--ivory) 75% 100%);}
#brand{display:flex;flex-direction:column;line-height:1.1;padding-left:64px;}
#brand h1{color:var(--cream);font-size:20px;font-weight:800;letter-spacing:3px;}
#brand .sub{color:var(--orange);font-size:8px;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;}
#mode-btns{display:flex;gap:8px;}
.mode-btn{background:#352b22;border:2px solid #4a3c2e;border-radius:8px;color:var(--cream);font-size:20px;width:42px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mode-btn.active{border-color:var(--yellow);background:#41331f;}
#timbre-row{height:74px;background:transparent;display:flex;padding:10px 8px 6px;gap:6px;flex-shrink:0;}
.timbre-btn{flex:1;border-radius:9px;border:2px solid rgba(0,0,0,0.35);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:0.08em;box-shadow:0 2px 0 rgba(0,0,0,0.3);}
.timbre-btn:active{transform:scale(0.95);}
.timbre-btn .led{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.3);}
.timbre-btn.active{border-color:var(--cream);box-shadow:0 0 0 2px rgba(244,233,216,0.35),0 2px 0 rgba(0,0,0,0.3);}
.timbre-btn.active .led{background:#ff5a36;box-shadow:0 0 6px #ff5a36;}
#tb-chip{background:var(--red);color:var(--cream);}
#tb-bell{background:var(--yellow);color:var(--ink);}
#tb-piano{background:var(--ivory);color:var(--ink);}
#tb-pad{background:var(--orange);color:var(--cream);}
#tb-acid{background:var(--blue);color:var(--cream);}
#knobs-row{height:170px;display:flex;padding:8px;gap:4px;border-top:1px solid var(--terracotta-dark);border-bottom:1px solid var(--terracotta-dark);flex-shrink:0;align-items:center;justify-content:space-around;}
.knob-col{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;}
.knob-col .knob-label{font-size:9px;}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;}
.knob{width:60px;height:60px;cursor:pointer;touch-action:none;}
.knob-label{color:var(--cream);font-size:10px;font-weight:700;letter-spacing:1px;}
.arp-notes-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;height:80px;justify-content:center;}
.arp-notes-btns{display:flex;gap:3px;width:100%;height:28px;}
.arp-note-btn{flex:1;background:var(--terracotta-dark);border:1.5px solid rgba(0,0,0,0.35);border-radius:6px;color:var(--cream);font-size:13px;font-weight:700;cursor:pointer;}
.arp-note-btn.active{border-color:var(--cream);background:var(--ink);color:var(--yellow);}
/* ── Looper ── */
#looper-row{height:74px;background:var(--terracotta-deep);display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--terracotta-dark);flex-shrink:0;}
.loop-knob-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;width:52px;}
.loop-knob-wrap .knob{width:48px;height:48px;}
.loop-knob-wrap .knob-label{font-size:9px;}
.loop-btn{height:44px;min-width:54px;border-radius:8px;border:2px solid rgba(0,0,0,0.4);background:var(--ink);color:var(--cream);font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;flex-shrink:0;}
.loop-btn:active{transform:scale(0.95);}
.loop-btn:disabled{opacity:0.35;}
#looper-rec.recording{background:#5f1e1e;border-color:#e84a4a;color:#ff8a8a;animation:recpulse 0.9s infinite;}
#looper-rec.playing{border-color:var(--yellow);color:var(--yellow);}
.loop-btn.clear{background:#332a22;color:#d8cdbd;}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
#looper-track{flex:1;height:44px;position:relative;background:#2a1a10;border:1px solid rgba(0,0,0,0.45);border-radius:8px;overflow:hidden;display:flex;align-items:center;}
#looper-bar{position:absolute;left:0;top:0;height:100%;width:0;background:linear-gradient(90deg,var(--yellow),var(--orange));opacity:0.4;}
#looper-track.recording #looper-bar{background:#e84a4a;opacity:0.45;}
#looper-status{position:relative;z-index:1;padding:0 12px;font-size:11px;color:var(--cream);font-weight:600;letter-spacing:1px;white-space:nowrap;}
#visualizer{height:50px;background:var(--casing);border-bottom:1px solid var(--terracotta-dark);flex-shrink:0;}
#vis-canvas{width:100%;height:100%;}
#notes-area{height:0;background:#1a120c;overflow:hidden;position:relative;border-bottom:1px solid var(--terracotta-dark);flex-shrink:0;transition:height 0.3s;}
#notes-area.game-active{height:160px;}
#notes-canvas{position:absolute;inset:0;width:100%;height:100%;}
#song-select{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:12px;padding:8px;}
.song-btn{flex:1;background:var(--ivory);border:2px solid var(--red);border-radius:10px;color:var(--ink);font-size:12px;font-weight:700;padding:8px 4px;cursor:pointer;text-align:center;}
.song-btn:active{background:#e3d8c4;}
#score-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--cream);}
#score-overlay.show{display:flex;}
#score-stars{font-size:36px;letter-spacing:4px;}
#score-text{font-size:14px;color:var(--yellow);}
#score-counts{font-size:12px;color:#c9bda9;}
#score-retry{background:var(--red);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:10px 24px;cursor:pointer;margin-top:4px;}
#judgment{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:30px;pointer-events:none;opacity:0;transition:opacity 0.4s;}
#keyboard-wrap{flex:1;position:relative;min-height:0;touch-action:none;background:var(--casing);}
#keyboard{width:100%;height:100%;position:relative;display:flex;}
.white-key{flex:1;background:#f7f3ea;border:1px solid #c9bfb0;border-top:none;border-radius:0 0 6px 6px;cursor:pointer;}
.white-key.pressed{background:var(--orange);}
.black-key{position:absolute;background:var(--casing);border-radius:0 0 4px 4px;border:1px solid #000;z-index:2;cursor:pointer;top:0;}
.black-key.pressed{background:var(--yellow);}
.key-dot{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--red);opacity:0;pointer-events:none;}
.key-dot.show{opacity:1;}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← index</a>
<div id="landscape-warn">
  <div style="font-size:48px">📱</div>
  <div>縦にしてね</div>
</div>
<div id="app">
  <div id="side-left"></div>
  <div id="main">
    <div id="header">
      <div id="brand">
        <span class="sub">Rhythm Composer</span>
        <h1>TR-808</h1>
      </div>
      <div id="mode-btns">
        <button class="mode-btn active" id="btn-play">▶</button>
        <button class="mode-btn" id="btn-game">🎮</button>
      </div>
    </div>
    <div id="timbre-row">
      <button class="timbre-btn active" id="tb-chip" data-timbre="0"><span class="led"></span><span>CHIP</span></button>

      <button class="timbre-btn" id="tb-piano" data-timbre="2"><span class="led"></span><span>PIANO</span></button>
      <button class="timbre-btn" id="tb-pad" data-timbre="3"><span class="led"></span><span>PAD</span></button>
      <button class="timbre-btn" id="tb-acid" data-timbre="4"><span class="led"></span><span>ACID</span></button>

    <div id="knobs-row">
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-arpSpd" width="60" height="60" data-knob="arpSpd"></canvas><div class="knob-label">ARP SPD</div></div>

          <div class="knob-label">NOTES</div>
          <div class="arp-notes-btns">
            <button class="arp-note-btn" data-notes="2">2</button>

      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-dlyFb" width="60" height="60" data-knob="dlyFb"></canvas><div class="knob-label">DLY FB</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-dlyTime" width="60" height="60" data-knob="dlyTime"></canvas><div class="knob-label">DLY TIME</div></div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-rev" width="60" height="60" data-knob="rev"></canvas><div class="knob-label">REV</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-cho" width="60" height="60" data-knob="cho"></canvas><div class="knob-label">CHO</div></div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-trm" width="60" height="60" data-knob="trm"></canvas><div class="knob-label">TRM</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-wave" width="60" height="60" data-knob="wave"></canvas><div class="knob-label">WAVE</div></div>

    </div>
    <div id="looper-row">
      <button id="looper-rec" class="loop-btn">● REC</button>
      <div id="looper-track"><div id="looper-bar"></div><span id="looper-status">長押しで録音</span></div>
      <div class="loop-knob-wrap"><canvas class="knob" id="knob-loopSpd" width="48" height="48" data-knob="loopSpd"></canvas><div class="knob-label">SPEED</div></div>
      <button id="looper-clear" class="loop-btn clear" disabled>CLR</button>
    </div>
    <div id="visualizer"><canvas id="vis-canvas"></canvas></div>
    <div id="notes-area">
      <canvas id="notes-canvas"></canvas>
      <div id="song-select">
        <button class="song-btn" data-song="twinkle">⭐<br>きらきら星</button>
        <button class="song-btn" data-song="frog">🐸<br>カエルの合唱</button>
        <button class="song-btn" data-song="tulip">🌷<br>チューリップ</button>
      </div>
      <div id="judgment"></div>
      <div id="score-overlay">
        <div id="score-stars"></div>
        <div id="score-text"></div>

        <button id="score-retry">もういちど</button>
      </div>
    </div>
    <div id="keyboard-wrap"><div id="keyboard"></div></div>
  </div>
  <div id="side-right"></div>
</div>

<script>
'use strict';

// ── Polyfill roundRect ──────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = Math.min(r, w/2, h/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);
    this.closePath();
    return this;
  };
}

// ── Audio ───────────────────────────────────────────────────────
let audioCtx = null;
// Effect buses
let masterGain, compressorNode, analyserNode;
let reverbConv, reverbWetGain, reverbDryGain;
let delayNode, delayFBGain, delayWetGain, delayDryGain;
let chorusDelayNode, chorusLFO, chorusWetGain, chorusDryGain;
// Voice output bus (all voices connect here)
let voiceBusGain;
// Tremolo
let tremoloGain, tremoloLFO, tremoloDepthGain;
// Looper (separate output bus for recorded audio)
let recProcessor, loopGain, loopComp;

function buildIR(ctx, dur) {
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 3);
  }
  return buf;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.8;
  compressorNode = audioCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -12; compressorNode.ratio.value = 8;
  compressorNode.attack.value = 0.003; compressorNode.release.value = 0.25;
  analyserNode = audioCtx.createAnalyser(); analyserNode.fftSize = 256;
  masterGain.connect(compressorNode);
  compressorNode.connect(analyserNode);
  analyserNode.connect(audioCtx.destination);

  // Reverb section
  reverbConv = audioCtx.createConvolver(); reverbConv.buffer = buildIR(audioCtx, 2.0);
  reverbWetGain = audioCtx.createGain(); reverbWetGain.gain.value = 0;
  reverbDryGain = audioCtx.createGain(); reverbDryGain.gain.value = 1;
  reverbConv.connect(reverbWetGain); reverbWetGain.connect(masterGain);
  reverbDryGain.connect(masterGain);

  // Delay section
  delayNode = audioCtx.createDelay(2.0); delayNode.delayTime.value = 0.05 + 0.30*0.95;
  delayFBGain = audioCtx.createGain(); delayFBGain.gain.value = 0;
  delayWetGain = audioCtx.createGain(); delayWetGain.gain.value = 0;
  delayDryGain = audioCtx.createGain(); delayDryGain.gain.value = 1;
  delayNode.connect(delayFBGain); delayFBGain.connect(delayNode);
  delayNode.connect(delayWetGain);
  delayWetGain.connect(reverbDryGain); delayWetGain.connect(reverbConv);
  delayDryGain.connect(reverbDryGain); delayDryGain.connect(reverbConv);

  // Chorus section
  chorusDelayNode = audioCtx.createDelay(0.1); chorusDelayNode.delayTime.value = 0.030;
  chorusLFO = audioCtx.createOscillator(); chorusLFO.type = 'sine'; chorusLFO.frequency.value = 0.5;
  const chorusDepth = audioCtx.createGain(); chorusDepth.gain.value = 0.005;
  chorusLFO.connect(chorusDepth); chorusDepth.connect(chorusDelayNode.delayTime); chorusLFO.start();
  chorusWetGain = audioCtx.createGain(); chorusWetGain.gain.value = 0;
  chorusDryGain = audioCtx.createGain(); chorusDryGain.gain.value = 1;
  chorusDelayNode.connect(chorusWetGain);
  chorusWetGain.connect(delayDryGain); chorusWetGain.connect(delayNode);
  chorusDryGain.connect(delayDryGain); chorusDryGain.connect(delayNode);

  // Voice bus
  voiceBusGain = audioCtx.createGain(); voiceBusGain.gain.value = 1;

  // Tremolo: LFO modulates tremoloGain.gain, inserted between voiceBus and chorus
  tremoloGain = audioCtx.createGain();
  tremoloGain.gain.value = 1.0;
  tremoloLFO = audioCtx.createOscillator();
  tremoloLFO.type = 'sine';
  tremoloLFO.frequency.value = 0.5;
  tremoloDepthGain = audioCtx.createGain();
  tremoloDepthGain.gain.value = 0;
  tremoloLFO.connect(tremoloDepthGain);
  tremoloDepthGain.connect(tremoloGain.gain);
  tremoloLFO.start();

  voiceBusGain.connect(tremoloGain);
  tremoloGain.connect(chorusDryGain);
  tremoloGain.connect(chorusDelayNode);

  // ── Looper: SEPARATE output bus for the recorded loop ──────────
  // The recorded loop plays through its own gain → its own compressor →
  // destination, completely independent from the live (realtime) path.
  // This way the loop's speed/pitch and overdub layers never disturb the
  // live keyboard signal, and the two are mixed only at the speakers.
  loopGain = audioCtx.createGain(); loopGain.gain.value = 1;
  loopComp = audioCtx.createDynamicsCompressor();
  loopComp.threshold.value = -14; loopComp.ratio.value = 6;
  loopComp.attack.value = 0.003; loopComp.release.value = 0.25;
  loopGain.connect(loopComp);
  loopComp.connect(audioCtx.destination);

  // The recorder taps ONLY the live mix (post live-compressor). The
  // existing loop is folded in by seeding the record buffer with it, so
  // overdub layers without the loop output ever being re-sampled.
  recProcessor = audioCtx.createScriptProcessor(4096, 2, 2);
  recProcessor.onaudioprocess = onRecProcess;
  const recSink = audioCtx.createGain(); recSink.gain.value = 0; // silent driver
  compressorNode.connect(recProcessor);
  recProcessor.connect(recSink);
  recSink.connect(audioCtx.destination);
}

const startAudio = () => {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
};
document.addEventListener('touchstart', startAudio, {once:true});
document.addEventListener('click', startAudio, {once:true});

// ── Knobs ───────────────────────────────────────────────────────
const knobVals = {arpSpd:0, dlyFb:0, dlyTime:30, rev:0, cho:0, trm:0, wave:0, loopSpd:50};

function applyEffect(name, val) {
  if (!audioCtx) return;
  const v = val / 100;
  switch(name) {
    case 'arpSpd':
      // value used at noteOn time
      break;
    case 'dlyFb':
      delayFBGain.gain.setTargetAtTime(Math.min(0.98, v*0.98), audioCtx.currentTime, 0.02);
      delayWetGain.gain.setTargetAtTime(v*0.7, audioCtx.currentTime, 0.02);
      break;
    case 'dlyTime':
      delayNode.delayTime.setTargetAtTime(0.05 + v*0.95, audioCtx.currentTime, 0.05);
      break;
    case 'rev':
      reverbWetGain.gain.setTargetAtTime(v*0.85, audioCtx.currentTime, 0.02);
      break;
    case 'cho':
      chorusWetGain.gain.setTargetAtTime(v*0.7, audioCtx.currentTime, 0.02);
      break;
    case 'trm': {
      const freq = 0.5 * Math.pow(60, v);
      const depth = v * 0.95;
      tremoloLFO.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.02);
      tremoloDepthGain.gain.setTargetAtTime(depth, audioCtx.currentTime, 0.02);
      tremoloGain.gain.setTargetAtTime(1 - depth/2, audioCtx.currentTime, 0.02);
      break;
    }
    case 'wave':
      // value used at createVoice time
      break;
    case 'loopSpd':
      // Speed & pitch move together (resampling): 0→0.5x(低速・低音)、
      // 50→1.0x(等速)、100→2.0x(高速・高音)
      loopRate = 0.5 * Math.pow(2, val/50);
      if (loopSource) loopSource.playbackRate.setTargetAtTime(loopRate, audioCtx.currentTime, 0.02);
      break;
  }
}

function drawKnob(canvas, val) {
  const ctx = canvas.getContext('2d'), w=canvas.width, h=canvas.height, cx=w/2, cy=h/2, r=w/2-4;
  ctx.clearRect(0,0,w,h);
  // White knob body
  const g = ctx.createRadialGradient(cx*.7,cy*.7,2,cx,cy,r);
  g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#cfc8bd');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#7a6a58'; ctx.lineWidth=1.5; ctx.stroke();
  const sa=(225*Math.PI/180), span=(270*Math.PI/180);
  ctx.beginPath(); ctx.arc(cx,cy,r-5,sa,sa+span); ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=3; ctx.stroke();
  if (val>0) {
    ctx.beginPath(); ctx.arc(cx,cy,r-5,sa,sa+(val/100)*span); ctx.strokeStyle='#2f6fd0'; ctx.lineWidth=3; ctx.stroke();
  }
  const ang = (225+(val/100)*270)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(ang)*(r-12), cy+Math.sin(ang)*(r-12));
  ctx.lineTo(cx+Math.cos(ang)*(r-4), cy+Math.sin(ang)*(r-4));
  ctx.strokeStyle='#1c1a16'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  ctx.fillStyle='#1d5fc2'; ctx.font='bold 8px ui-monospace,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  let lbl;
  if (canvas.dataset.knob === 'wave') {
    if (val < 25) lbl = 'SIN';
    else if (val < 50) lbl = 'SQR';
    else if (val < 75) lbl = 'TRI';
    else lbl = 'SAW';
  } else if (canvas.dataset.knob === 'loopSpd') {
    lbl = (0.5 * Math.pow(2, val/50)).toFixed(2) + 'x';
  } else if (val === 100 && canvas.dataset.knob === 'dlyFb') {
    lbl = '∞';
  } else {
    lbl = Math.round(val) + '%';
  }
  ctx.fillText(lbl, cx, cy+1);
}

// ── Looper (hold-to-overdub, separate output bus) ───────────────
const LOOP_SECONDS = 3;
let looperState = 'idle';   // 'idle' | 'recording' | 'playing'
let recBufL = null, recBufR = null, recPos = 0, recTotal = 0;
let loopBuffer = null, loopSource = null, loopStartTime = 0;
let loopRate = 1.0;         // playbackRate (speed & pitch linked)
let recHadLoop = false;     // true → this take is an overdub

const recBtn = document.getElementById('looper-rec');
const clrBtn = document.getElementById('looper-clear');
const trackEl = document.getElementById('looper-track');
const barEl = document.getElementById('looper-bar');
const statusEl = document.getElementById('looper-status');

// While RECording, live input is ADDED onto the record buffer and the
// position WRAPS at the loop end — so holding REC layers pass after pass
// (overdub). The existing loop keeps playing audibly the whole time.
function onRecProcess(e) {
  if (looperState !== 'recording') return;
  const inBuf = e.inputBuffer;
  const inL = inBuf.getChannelData(0);
  const inR = inBuf.numberOfChannels > 1 ? inBuf.getChannelData(1) : inL;
  const n = inL.length;
  for (let i = 0; i < n; i++) {
    recBufL[recPos] += inL[i];
    recBufR[recPos] += inR[i];
    recPos++;
    if (recPos >= recTotal) recPos = 0;   // wrap → continuous overdub
  }
}

function stopLoopSource() {
  if (loopSource) {
    try { loopSource.stop(); } catch(e) {}
    try { loopSource.disconnect(); } catch(e) {}
    loopSource = null;
  }
}

function startLoopPlayback() {
  if (!loopBuffer || !audioCtx) return;
  stopLoopSource();
  loopSource = audioCtx.createBufferSource();
  loopSource.buffer = loopBuffer;
  loopSource.loop = true;
  loopSource.playbackRate.value = loopRate;   // speed/pitch
  loopSource.connect(loopGain);
  loopStartTime = audioCtx.currentTime;
  loopSource.start();
}

function startRecording() {
  startAudio();
  if (!audioCtx) return;
  if (looperState === 'recording') return;
  recTotal = Math.floor(audioCtx.sampleRate * LOOP_SECONDS);
  recBufL = new Float32Array(recTotal);
  recBufR = new Float32Array(recTotal);
  recHadLoop = !!loopBuffer;
  // Overdub: seed the buffer with the existing loop so it is preserved
  // and layered. The old loop also keeps playing (audible) meanwhile.
  if (loopBuffer) {
    recBufL.set(loopBuffer.getChannelData(0).subarray(0, recTotal));
    recBufR.set(loopBuffer.getChannelData(1).subarray(0, recTotal));
  }
  recPos = 0;
  looperState = 'recording';
  updateLooperUI();
}

function finishRecording() {
  if (looperState !== 'recording') return;
  // Soft-clip so stacked overdubs stay bounded (still gritty = chaos OK)
  for (let i = 0; i < recTotal; i++) {
    recBufL[i] = Math.tanh(recBufL[i]);
    recBufR[i] = Math.tanh(recBufR[i]);
  }
  loopBuffer = audioCtx.createBuffer(2, recTotal, audioCtx.sampleRate);
  loopBuffer.copyToChannel(recBufL, 0);
  loopBuffer.copyToChannel(recBufR, 1);
  recBufL = recBufR = null;
  looperState = 'playing';
  startLoopPlayback();          // swap in the freshly baked loop
  updateLooperUI();
}

function clearLoop() {
  stopLoopSource();
  loopBuffer = null;
  looperState = 'idle';
  updateLooperUI();
}

function updateLooperUI() {
  recBtn.classList.toggle('recording', looperState === 'recording');
  recBtn.classList.toggle('playing', looperState === 'playing');
  clrBtn.disabled = (looperState === 'idle');
  trackEl.classList.toggle('recording', looperState === 'recording');
  if (looperState === 'idle') {
    recBtn.textContent = '● REC';
    barEl.style.width = '0%';
    statusEl.textContent = '長押しで録音';
  } else if (looperState === 'recording') {
    recBtn.textContent = '■ REC';
  } else {
    recBtn.textContent = '● DUB';
    statusEl.textContent = 'LOOP ▶';
  }
}

// Hold to record / overdub; release (or leave) to bake the take.
recBtn.addEventListener('pointerdown', e => { e.preventDefault(); recBtn.setPointerCapture(e.pointerId); startRecording(); });
recBtn.addEventListener('pointerup', e => { e.preventDefault(); finishRecording(); });
recBtn.addEventListener('pointercancel', () => finishRecording());
clrBtn.addEventListener('click', clearLoop);

(function looperRAF() {
  requestAnimationFrame(looperRAF);
  if (!audioCtx) return;
  if (looperState === 'recording') {
    barEl.style.width = (recTotal ? recPos / recTotal * 100 : 0) + '%';
    statusEl.textContent = recHadLoop ? '● OVERDUB' : '● REC';
  } else if (looperState === 'playing' && loopSource) {
    const dur = LOOP_SECONDS / (loopRate || 1);   // faster rate → shorter loop
    barEl.style.width = (((audioCtx.currentTime - loopStartTime) % dur) / dur * 100) + '%';
  }
})();

// ── Voice synthesis ─────────────────────────────────────────────
function midiFreq(m) { return 440*Math.pow(2,(m-69)/12); }

const activeVoices = {};

function getEffectiveWave(timbre) {
  const w = knobVals.wave;
  if (w === 0) return null;
  if (w < 25) return 'sine';
  if (w < 50) return 'square';
  if (w < 75) return 'triangle';
  return 'sawtooth';
}

function createVoice(note, timbre) {
  if (!audioCtx) return null;
  const freq = midiFreq(note), now = audioCtx.currentTime;
  const vg = audioCtx.createGain();
  vg.connect(voiceBusGain);

  const waveOverride = getEffectiveWave(timbre);
  let o1,o2,filt;
  switch(timbre) {
    case 0:
      // CHIP: square + standard ADSR
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'square'; o1.frequency.value=freq;
      o1.connect(vg); o1.start();
      break;
    case 1: {
      // BELL: triangle + sine 2nd harmonic
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'triangle'; o1.frequency.value=freq;
      o2=audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
      const hg=audioCtx.createGain(); hg.gain.value=0.25;
      o1.connect(vg); o2.connect(hg); hg.connect(vg);
      o1.start(); o2.start();
      break;
    }
    case 2: {
      // PIANO: sine fundamental + triangle 2nd harmonic, exp decay
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.7, now+0.005);
      vg.gain.exponentialRampToValueAtTime(0.0001, now+1.2);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sine'; o1.frequency.value=freq;
      o2=audioCtx.createOscillator(); o2.type='triangle'; o2.frequency.value=freq*2;
      const pg=audioCtx.createGain(); pg.gain.value=0.15;
      o1.connect(vg); o2.connect(pg); pg.connect(vg);
      o1.start(); o2.start();
      break;
    }
    case 3:
      // PAD: sine through a gentle lowpass
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sine'; o1.frequency.value=freq;
      filt=audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=2000;
      o1.connect(filt); filt.connect(vg); o1.start();
      break;
    case 4:
      // ACID: sawtooth through a resonant lowpass
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sawtooth'; o1.frequency.value=freq;
      filt=audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1500; filt.Q.value=4;
      o1.connect(filt); filt.connect(vg); o1.start();
      break;
  }
  return {o1,o2,filt,gain:vg,timbre};
}

function releaseVoice(v) {
  if (!v||!v.gain) return;
  const now = audioCtx.currentTime;
  // Piano (timbre 2) already has natural exp decay; let it finish unless still ringing
  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value, now);
  v.gain.gain.exponentialRampToValueAtTime(0.0001, now+0.3);
  setTimeout(()=>{
    try{v.o1&&v.o1.stop();}catch(e){}
    try{v.o2&&v.o2.stop();}catch(e){}
    try{v.gain.disconnect();}catch(e){}
  }, 400);
}

function noteOn(note, timbre) {
  if (!audioCtx) initAudio();
  noteOff(note);
  const arpSpd = knobVals.arpSpd;
  if (arpSpd > 0) {
    let idx = 0;
    const ms = 800 - (arpSpd - 1) * (720 / 99);
    const state = {arpInterval: null, arpVoice: null};
    const tick = () => {
      if (!activeVoices[note]) return;
      const semisLive = ARP_INTERVALS[currentArpNotes];
      const an = note + semisLive[idx % semisLive.length];
      if (state.arpVoice) releaseVoice(state.arpVoice);
      state.arpVoice = createVoice(an, timbre);
      idx++;
    };
    state.arpInterval = setInterval(tick, ms);
    activeVoices[note] = state;
    tick();
  } else {
    const v = createVoice(note, timbre);
    if (v) activeVoices[note] = v;
  }
}

function noteOff(note) {
  const v=activeVoices[note]; if (!v) return;
  if (v.arpInterval) { clearInterval(v.arpInterval); if (v.arpVoice) releaseVoice(v.arpVoice); }
  else releaseVoice(v);
  delete activeVoices[note];
}

// ── Game ─────────────────────────────────────────────────────────
const gState={active:false,song:null,notes:[],startTime:0,beatDur:0,perfects:0,goods:0,misses:0};
const notesC=document.getElementById('notes-canvas'), notesX=notesC.getContext('2d');
let notesRaf=null;

function resizeNotesCanvas(){
  notesC.width=notesArea.clientWidth||document.getElementById('main').clientWidth;
  notesC.height=notesArea.clientHeight||160;
}

function showSongSelect(){
  document.getElementById('song-select').style.display='flex';
  document.getElementById('score-overlay').classList.remove('show');
  gState.active=false;
}

document.querySelectorAll('.song-btn').forEach(btn=>btn.addEventListener('click',()=>startGame(btn.dataset.song)));
document.getElementById('score-retry').addEventListener('click',showSongSelect);

function startGame(songKey){
  startAudio();
  const song=SONGS[songKey]; if (!song) return;
  document.getElementById('song-select').style.display='none';
  resizeNotesCanvas();

  const bd=60/song.bpm;
  const t0=(audioCtx ? audioCtx.currentTime : performance.now()/1000) + 0.8;
  gState.active=true; gState.song=song; gState.beatDur=bd; gState.startTime=t0;
  gState.perfects=0; gState.goods=0; gState.misses=0;

  gState.notes = song.notes.filter(n=>!n.skip).map(n=>({
    ts: t0 + n.t * bd, note: n.n, hit:false, missed:false
  }));

  // Schedule playback
  song.notes.forEach(n=>{
    if (n.skip) return;
    const ts=t0+n.t*bd;
    const o=audioCtx.createOscillator(); o.type='square'; o.frequency.value=midiFreq(n.n);
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.001,ts);
    g.gain.linearRampToValueAtTime(0.12,ts+0.02);
    g.gain.setTargetAtTime(0.0001,ts+bd*0.7,0.04);
    o.connect(g); g.connect(masterGain);
    o.start(ts); o.stop(ts+bd*1.5);
  });

  if (notesRaf) cancelAnimationFrame(notesRaf);
  gameLoop();
}

function stopGame(){
  gState.active=false;
  if (notesRaf){cancelAnimationFrame(notesRaf); notesRaf=null;}
  notesX.clearRect(0,0,notesC.width,notesC.height);
}

function noteToX(note, w) {
  const wi = WHITE_NOTES.indexOf(note);
  if (wi>=0) return (wi+0.5)*(w/10);
  const bp = BLACK_POSITIONS.find(b=>b.note===note);
  if (bp) return bp.idx*(w/10)+(w/10);
  return w/2;
}

function gameLoop(){
  notesRaf=requestAnimationFrame(gameLoop);
  if (!gState.active) return;

  const now=audioCtx ? audioCtx.currentTime : performance.now()/1000;
  const w=notesC.width, h=notesC.height;
  notesX.clearRect(0,0,w,h);

  // Hit line
  const hitY=h-20;
  notesX.strokeStyle='rgba(232,197,71,0.35)'; notesX.lineWidth=2;
  notesX.beginPath(); notesX.moveTo(0,hitY); notesX.lineTo(w,hitY); notesX.stroke();

  const fallDur=1.8;

  gState.notes.forEach(n=>{
    if (n.hit) return;
    const dt=n.ts-now;
    if (!n.missed && dt < -0.15) { n.missed=true; gState.misses++; showJudge('miss'); return; }
    if (n.hit||n.missed) return;
    const y=hitY*(1-dt/fallDur);
    if (y<-20||y>h+20) return;
    const x=noteToX(n.note,w);
    const isBlack=BLACK_POSITIONS.some(b=>b.note===n.note);
    const nw=isBlack?18:26, nh=16;
    notesX.beginPath(); notesX.roundRect(x-nw/2,y-nh/2,nw,nh,5);
    notesX.fillStyle=isBlack?'#e8c547':'#c73e3e'; notesX.fill();
    notesX.strokeStyle='rgba(255,255,255,0.6)'; notesX.lineWidth=1; notesX.stroke();
    notesX.fillStyle='#fff'; notesX.font='10px system-ui'; notesX.textAlign='center'; notesX.textBaseline='middle';
    notesX.fillText('♪',x,y);
  });

  const last=gState.notes[gState.notes.length-1];
  if (last && now > last.ts+2.5) endGame();
}

function checkHit(pressedNote){
  if (!gState.active) return;
  const now=audioCtx ? audioCtx.currentTime : performance.now()/1000;
  let best=null, bestDt=Infinity;
  gState.notes.forEach(n=>{
    if (n.hit||n.missed||n.note!==pressedNote) return;
    const dt=Math.abs(n.ts-now);
    if (dt<bestDt){bestDt=dt; best=n;}
  });
  if (!best) return;
  if (bestDt<=0.08){best.hit=true; gState.perfects++; showJudge('perfect');}
  else if (bestDt<=0.15){best.hit=true; gState.goods++; showJudge('good');}
}

let judgeTimer=null;
function showJudge(type){
  const el=document.getElementById('judgment');
  el.textContent=type==='perfect'?'⭐':type==='good'?'◯':'✕';
  el.style.color=type==='perfect'?'#e8c547':type==='good'?'#4db848':'#c73e3e';
  el.style.opacity='1';
  if(judgeTimer)clearTimeout(judgeTimer);
  judgeTimer=setTimeout(()=>el.style.opacity='0',600);
}

function endGame(){
  gState.active=false;
  if(notesRaf){cancelAnimationFrame(notesRaf); notesRaf=null;}
  const total=gState.perfects+gState.goods+gState.misses;
  const sc=total>0?(gState.perfects+gState.goods*0.5)/total:0;
  let stars=sc>=0.9?'⭐⭐⭐':sc>=0.7?'⭐⭐☆':sc>=0.4?'⭐☆☆':'☆☆☆';
  document.getElementById('score-stars').textContent=stars;
  document.getElementById('score-text').textContent=gState.song.emoji+' '+gState.song.name;
  document.getElementById('score-counts').textContent=`⭐${gState.perfects}  ◯${gState.goods}  ✕${gState.misses}`;
  document.getElementById('score-overlay').classList.add('show');
}
</script>
