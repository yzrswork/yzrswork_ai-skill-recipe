<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TR-808 KIDS</title>
<style>
.back-btn{position:fixed;top:16px;left:16px;z-index:999;color:rgba(255,255,255,0.35);text-decoration:none;font-family:'DM Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}
.back-btn:hover{color:rgba(255,255,255,0.75);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a1a;font-family:-apple-system,"SF Pro",system-ui,sans-serif;user-select:none;-webkit-user-select:none;overscroll-behavior:none;}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#landscape-warn{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#f5f5f5;font-size:24px;text-align:center;}
@media (orientation:landscape) and (max-height:500px){#landscape-warn{display:flex;}}
#app{flex:1;display:flex;min-height:0;}
#wood-left,#wood-right{width:12px;background:linear-gradient(180deg,#5c3a1e,#3d2611);flex-shrink:0;}
#main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
#header{height:48px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;padding:0 12px;border-bottom:1px solid #3a3a3a;flex-shrink:0;}
#header h1{color:#e8c547;font-size:18px;font-weight:700;letter-spacing:2px;}
#timbre-row{height:80px;background:#2a2a2a;display:flex;padding:8px;gap:6px;border-bottom:1px solid #3a3a3a;flex-shrink:0;}
.timbre-btn{flex:1;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:#f5f5f5;font-weight:600;}
.timbre-btn:active{transform:scale(0.95);}
.timbre-btn.active{border-color:#e8c547;}
.timbre-btn .icon{font-size:24px;}
#t0{background:#1e3a5f;}#t1{background:#5f4a1e;}#t2{background:#3a1e5f;}
#knobs-row{height:170px;background:#2a2a2a;display:flex;padding:8px;gap:4px;border-bottom:1px solid #3a3a3a;flex-shrink:0;align-items:center;justify-content:space-around;}
.knob-col{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;}
.knob-col .knob-label{font-size:9px;}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;}
.knob{width:60px;height:60px;cursor:pointer;touch-action:none;}
.knob-label{color:#aaa;font-size:10px;font-weight:600;letter-spacing:1px;}
.arp-notes-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;height:80px;justify-content:center;}
.arp-notes-btns{display:flex;gap:3px;width:100%;height:28px;}
.arp-note-btn{flex:1;background:#3a3a3a;border:1.5px solid #4a4a4a;border-radius:6px;color:#f5f5f5;font-size:13px;font-weight:700;cursor:pointer;}
.arp-note-btn.active{border-color:#e8c547;background:#3d3a1e;color:#e8c547;}
#visualizer{height:50px;background:#1a1a1a;border-bottom:1px solid #3a3a3a;flex-shrink:0;}
#vis-canvas{width:100%;height:100%;}
#keyboard-wrap{flex:1;position:relative;min-height:0;touch-action:none;}
#keyboard{width:100%;height:100%;position:relative;display:flex;}
.white-key{flex:1;background:#f5f5f5;border:1px solid #ccc;border-top:none;border-radius:0 0 6px 6px;cursor:pointer;}
.white-key.pressed{background:#d96f3d;}
.black-key{position:absolute;background:#1a1a1a;border-radius:0 0 4px 4px;border:1px solid #000;z-index:2;cursor:pointer;top:0;}
.black-key.pressed{background:#e8c547;}
.key-dot{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#c73e3e;opacity:0;pointer-events:none;}
.key-dot.show{opacity:1;}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← index</a>
<div id="landscape-warn">
  <div style="font-size:48px">📱</div>
  <div>縦にしてね</div>
</div>
<div id="app">
  <div id="wood-left"></div>
  <div id="main">
    <div id="header">
      <h1>TR-808 KIDS</h1>
    </div>
    <div id="timbre-row">
      <button class="timbre-btn active" id="t0" data-timbre="0"><span class="icon">🟦</span><span>ピコピコ</span></button>
      <button class="timbre-btn" id="t1" data-timbre="1"><span class="icon">🟨</span><span>キラキラ</span></button>
      <button class="timbre-btn" id="t2" data-timbre="2"><span class="icon">🎹</span><span>ピアノ</span></button>
    </div>
    <div id="knobs-row">
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-arpSpd" width="60" height="60" data-knob="arpSpd"></canvas><div class="knob-label">ARP SPD</div></div>
        <div class="arp-notes-wrap">
          <div class="knob-label">NOTES</div>
          <div class="arp-notes-btns">
            <button class="arp-note-btn" data-notes="2">2</button>
            <button class="arp-note-btn" data-notes="3">3</button>
            <button class="arp-note-btn active" data-notes="4">4</button>
          </div>
        </div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-dlyFb" width="60" height="60" data-knob="dlyFb"></canvas><div class="knob-label">DLY FB</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-dlyTime" width="60" height="60" data-knob="dlyTime"></canvas><div class="knob-label">DLY TIME</div></div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-rev" width="60" height="60" data-knob="rev"></canvas><div class="knob-label">REV</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-cho" width="60" height="60" data-knob="cho"></canvas><div class="knob-label">CHO</div></div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-trm" width="60" height="60" data-knob="trm"></canvas><div class="knob-label">TRM</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-wave" width="60" height="60" data-knob="wave"></canvas><div class="knob-label">WAVE</div></div>
      </div>
    </div>
    <div id="visualizer"><canvas id="vis-canvas"></canvas></div>
    <div id="keyboard-wrap"><div id="keyboard"></div></div>
  </div>
  <div id="wood-right"></div>
</div>

<script>
'use strict';

// ── Polyfill roundRect ──────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = Math.min(r, w/2, h/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);
    this.closePath();
    return this;
  };
}

// ── Audio ───────────────────────────────────────────────────────
let audioCtx = null;
// Effect buses
let masterGain, compressorNode, analyserNode;
let reverbConv, reverbWetGain, reverbDryGain;
let delayNode, delayFBGain, delayWetGain, delayDryGain;
let chorusDelayNode, chorusLFO, chorusWetGain, chorusDryGain;
// Voice output bus (all voices connect here)
let voiceBusGain;
// Tremolo
let tremoloGain, tremoloLFO, tremoloDepthGain;

function buildIR(ctx, dur) {
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 3);
  }
  return buf;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.8;
  compressorNode = audioCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -12; compressorNode.ratio.value = 8;
  compressorNode.attack.value = 0.003; compressorNode.release.value = 0.25;
  analyserNode = audioCtx.createAnalyser(); analyserNode.fftSize = 256;
  masterGain.connect(compressorNode);
  compressorNode.connect(analyserNode);
  analyserNode.connect(audioCtx.destination);

  // Reverb section
  reverbConv = audioCtx.createConvolver(); reverbConv.buffer = buildIR(audioCtx, 2.0);
  reverbWetGain = audioCtx.createGain(); reverbWetGain.gain.value = 0;
  reverbDryGain = audioCtx.createGain(); reverbDryGain.gain.value = 1;
  reverbConv.connect(reverbWetGain); reverbWetGain.connect(masterGain);
  reverbDryGain.connect(masterGain);

  // Delay section
  delayNode = audioCtx.createDelay(2.0); delayNode.delayTime.value = 0.05 + 0.30*0.95;
  delayFBGain = audioCtx.createGain(); delayFBGain.gain.value = 0;
  delayWetGain = audioCtx.createGain(); delayWetGain.gain.value = 0;
  delayDryGain = audioCtx.createGain(); delayDryGain.gain.value = 1;
  delayNode.connect(delayFBGain); delayFBGain.connect(delayNode);
  delayNode.connect(delayWetGain);
  delayWetGain.connect(reverbDryGain); delayWetGain.connect(reverbConv);
  delayDryGain.connect(reverbDryGain); delayDryGain.connect(reverbConv);

  // Chorus section
  chorusDelayNode = audioCtx.createDelay(0.1); chorusDelayNode.delayTime.value = 0.030;
  chorusLFO = audioCtx.createOscillator(); chorusLFO.type = 'sine'; chorusLFO.frequency.value = 0.5;
  const chorusDepth = audioCtx.createGain(); chorusDepth.gain.value = 0.005;
  chorusLFO.connect(chorusDepth); chorusDepth.connect(chorusDelayNode.delayTime); chorusLFO.start();
  chorusWetGain = audioCtx.createGain(); chorusWetGain.gain.value = 0;
  chorusDryGain = audioCtx.createGain(); chorusDryGain.gain.value = 1;
  chorusDelayNode.connect(chorusWetGain);
  chorusWetGain.connect(delayDryGain); chorusWetGain.connect(delayNode);
  chorusDryGain.connect(delayDryGain); chorusDryGain.connect(delayNode);

  // Voice bus
  voiceBusGain = audioCtx.createGain(); voiceBusGain.gain.value = 1;

  // Tremolo: LFO modulates tremoloGain.gain, inserted between voiceBus and chorus
  tremoloGain = audioCtx.createGain();
  tremoloGain.gain.value = 1.0;
  tremoloLFO = audioCtx.createOscillator();
  tremoloLFO.type = 'sine';
  tremoloLFO.frequency.value = 0.5;
  tremoloDepthGain = audioCtx.createGain();
  tremoloDepthGain.gain.value = 0;
  tremoloLFO.connect(tremoloDepthGain);
  tremoloDepthGain.connect(tremoloGain.gain);
  tremoloLFO.start();

  voiceBusGain.connect(tremoloGain);
  tremoloGain.connect(chorusDryGain);
  tremoloGain.connect(chorusDelayNode);
}

const startAudio = () => {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
};
document.addEventListener('touchstart', startAudio, {once:true});
document.addEventListener('click', startAudio, {once:true});

// ── Knobs ───────────────────────────────────────────────────────
const knobVals = {arpSpd:0, dlyFb:0, dlyTime:30, rev:0, cho:0, trm:0, wave:0};

function applyEffect(name, val) {
  if (!audioCtx) return;
  const v = val / 100;
  switch(name) {
    case 'arpSpd':
      // value used at noteOn time
      break;
    case 'dlyFb':
      delayFBGain.gain.setTargetAtTime(Math.min(0.98, v*0.98), audioCtx.currentTime, 0.02);
      delayWetGain.gain.setTargetAtTime(v*0.7, audioCtx.currentTime, 0.02);
      break;
    case 'dlyTime':
      delayNode.delayTime.setTargetAtTime(0.05 + v*0.95, audioCtx.currentTime, 0.05);
      break;
    case 'rev':
      reverbWetGain.gain.setTargetAtTime(v*0.85, audioCtx.currentTime, 0.02);
      break;
    case 'cho':
      chorusWetGain.gain.setTargetAtTime(v*0.7, audioCtx.currentTime, 0.02);
      break;
    case 'trm': {
      const freq = 0.5 * Math.pow(60, v);
      const depth = v * 0.95;
      tremoloLFO.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.02);
      tremoloDepthGain.gain.setTargetAtTime(depth, audioCtx.currentTime, 0.02);
      tremoloGain.gain.setTargetAtTime(1 - depth/2, audioCtx.currentTime, 0.02);
      break;
    }
    case 'wave':
      // value used at createVoice time
      break;
  }
}

function drawKnob(canvas, val) {
  const ctx = canvas.getContext('2d'), w=canvas.width, h=canvas.height, cx=w/2, cy=h/2, r=w/2-4;
  ctx.clearRect(0,0,w,h);
  const g = ctx.createRadialGradient(cx*.7,cy*.7,2,cx,cy,r);
  g.addColorStop(0,'#d8d8d8'); g.addColorStop(1,'#6a6a6a');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#444'; ctx.lineWidth=1.5; ctx.stroke();
  const sa=(225*Math.PI/180), span=(270*Math.PI/180);
  ctx.beginPath(); ctx.arc(cx,cy,r-5,sa,sa+span); ctx.strokeStyle='#555'; ctx.lineWidth=3; ctx.stroke();
  if (val>0) {
    ctx.beginPath(); ctx.arc(cx,cy,r-5,sa,sa+(val/100)*span); ctx.strokeStyle='#e8c547'; ctx.lineWidth=3; ctx.stroke();
  }
  const ang = (225+(val/100)*270)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(ang)*(r-12), cy+Math.sin(ang)*(r-12));
  ctx.lineTo(cx+Math.cos(ang)*(r-4), cy+Math.sin(ang)*(r-4));
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='8px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
  let lbl;
  if (canvas.dataset.knob === 'wave') {
    if (val < 25) lbl = 'SIN';
    else if (val < 50) lbl = 'SQR';
    else if (val < 75) lbl = 'TRI';
    else lbl = 'SAW';
  } else if (val === 100 && canvas.dataset.knob === 'dlyFb') {
    lbl = '∞';
  } else {
    lbl = Math.round(val) + '%';
  }
  ctx.fillText(lbl, cx, cy+1);
}

document.querySelectorAll('.knob').forEach(canvas => {
  const k = canvas.dataset.knob;
  drawKnob(canvas, knobVals[k]||0);
  let sy=0, sv=0, drag=false;
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault(); canvas.setPointerCapture(e.pointerId);
    drag=true; sy=e.clientY; sv=knobVals[k]||0;
  });
  canvas.addEventListener('pointermove', e => {
    if (!drag) return; e.preventDefault();
    const nv = Math.max(0, Math.min(100, sv+(sy-e.clientY)*0.8));
    knobVals[k]=nv; drawKnob(canvas,nv); applyEffect(k,nv);
  });
  canvas.addEventListener('pointerup', ()=>drag=false);
  canvas.addEventListener('pointercancel', ()=>drag=false);
});

// ── Timbre ──────────────────────────────────────────────────────
let currentTimbre = 0;
document.querySelectorAll('.timbre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.timbre-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentTimbre=parseInt(btn.dataset.timbre);
  });
});

// ── ARP NOTES ───────────────────────────────────────────────────
let currentArpNotes = 4;
const ARP_INTERVALS = {
  2: [0, 7],
  3: [0, 4, 7],
  4: [0, 4, 7, 12]
};
document.querySelectorAll('.arp-note-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.arp-note-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentArpNotes = parseInt(btn.dataset.notes);
  });
});

// ── Keyboard ────────────────────────────────────────────────────
const WHITE_NOTES = [60,62,64,65,67,69,71,72,74,76];
const BLACK_POSITIONS = [{idx:0,note:61},{idx:1,note:63},{idx:3,note:66},{idx:4,note:68},{idx:5,note:70},{idx:7,note:73},{idx:8,note:75}];
const keyEls = {};

function buildKeyboard() {
  const kbEl = document.getElementById('keyboard');
  kbEl.innerHTML = '';
  const wrap = document.getElementById('keyboard-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const whiteW = ww / 10;
  const blackW = whiteW * 0.6, blackH = wh * 0.6;

  WHITE_NOTES.forEach(note => {
    const el = document.createElement('div');
    el.className = 'white-key'; el.dataset.note = note;
    const dot = document.createElement('div'); dot.className='key-dot'; el.appendChild(dot);
    kbEl.appendChild(el); keyEls[note] = el;
  });
  BLACK_POSITIONS.forEach(({idx, note}) => {
    const el = document.createElement('div');
    el.className = 'black-key'; el.dataset.note = note;
    el.style.cssText = `width:${blackW}px;height:${blackH}px;left:${idx*whiteW+whiteW-blackW/2}px`;
    const dot = document.createElement('div'); dot.className='key-dot'; el.appendChild(dot);
    kbEl.appendChild(el); keyEls[note] = el;
  });
}
buildKeyboard();
window.addEventListener('resize', buildKeyboard);

// ── Voice synthesis ─────────────────────────────────────────────
function midiFreq(m) { return 440*Math.pow(2,(m-69)/12); }

const activeVoices = {};

function getEffectiveWave(timbre) {
  const w = knobVals.wave;
  if (w === 0) return null;
  if (w < 25) return 'sine';
  if (w < 50) return 'square';
  if (w < 75) return 'triangle';
  return 'sawtooth';
}

function createVoice(note, timbre) {
  if (!audioCtx) return null;
  const freq = midiFreq(note), now = audioCtx.currentTime;
  const vg = audioCtx.createGain();
  vg.connect(voiceBusGain);

  const waveOverride = getEffectiveWave(timbre);
  let o1,o2;
  switch(timbre) {
    case 0:
      // ピコピコ: square + standard ADSR
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'square'; o1.frequency.value=freq;
      o1.connect(vg); o1.start();
      break;
    case 1:
      // キラキラ: triangle + sine 2nd harmonic
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'triangle'; o1.frequency.value=freq;
      o2=audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
      const hg=audioCtx.createGain(); hg.gain.value=0.25;
      o1.connect(vg); o2.connect(hg); hg.connect(vg);
      o1.start(); o2.start();
      break;
    case 2: {
      // ピアノ: sine fundamental + triangle 2nd harmonic, exp decay
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.7, now+0.005);
      vg.gain.exponentialRampToValueAtTime(0.0001, now+1.2);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sine'; o1.frequency.value=freq;
      o2=audioCtx.createOscillator(); o2.type='triangle'; o2.frequency.value=freq*2;
      const pg=audioCtx.createGain(); pg.gain.value=0.15;
      o1.connect(vg); o2.connect(pg); pg.connect(vg);
      o1.start(); o2.start();
      break;
    }
  }
  return {o1,o2,gain:vg,timbre};
}

function releaseVoice(v) {
  if (!v||!v.gain) return;
  const now = audioCtx.currentTime;
  // Piano (timbre 2) already has natural exp decay; let it finish unless still ringing
  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value, now);
  v.gain.gain.exponentialRampToValueAtTime(0.0001, now+0.3);
  setTimeout(()=>{
    try{v.o1&&v.o1.stop();}catch(e){}
    try{v.o2&&v.o2.stop();}catch(e){}
    try{v.gain.disconnect();}catch(e){}
  }, 400);
}

function noteOn(note, timbre) {
  if (!audioCtx) initAudio();
  noteOff(note);
  const arpSpd = knobVals.arpSpd;
  if (arpSpd > 0) {
    let idx = 0;
    const ms = 800 - (arpSpd - 1) * (720 / 99);
    const state = {arpInterval: null, arpVoice: null};
    const tick = () => {
      if (!activeVoices[note]) return;
      const semisLive = ARP_INTERVALS[currentArpNotes];
      const an = note + semisLive[idx % semisLive.length];
      if (state.arpVoice) releaseVoice(state.arpVoice);
      state.arpVoice = createVoice(an, timbre);
      idx++;
    };
    state.arpInterval = setInterval(tick, ms);
    activeVoices[note] = state;
    tick();
  } else {
    const v = createVoice(note, timbre);
    if (v) activeVoices[note] = v;
  }
}

function noteOff(note) {
  const v=activeVoices[note]; if (!v) return;
  if (v.arpInterval) { clearInterval(v.arpInterval); if (v.arpVoice) releaseVoice(v.arpVoice); }
  else releaseVoice(v);
  delete activeVoices[note];
}

// ── Keyboard interaction ─────────────────────────────────────────
const ptrNotes={};

function getNoteAt(x,y) {
  const els=document.elementsFromPoint(x,y);
  for (const el of els) if (el.dataset&&el.dataset.note) return parseInt(el.dataset.note);
  return null;
}

function pressKey(note) {
  if (!note||isNaN(note)) return;
  const el=keyEls[note]; if (el) { el.classList.add('pressed'); el.querySelector('.key-dot')?.classList.add('show'); }
  noteOn(note, currentTimbre);
}
function releaseKey(note) {
  if (!note||isNaN(note)) return;
  const el=keyEls[note]; if (el) { el.classList.remove('pressed'); el.querySelector('.key-dot')?.classList.remove('show'); }
  noteOff(note);
}

const kbWrap=document.getElementById('keyboard-wrap');
kbWrap.style.touchAction='none';
kbWrap.addEventListener('pointerdown',e=>{
  e.preventDefault(); startAudio();
  const n=getNoteAt(e.clientX,e.clientY);
  if (n) { ptrNotes[e.pointerId]=n; pressKey(n); }
},{passive:false});
kbWrap.addEventListener('pointermove',e=>{
  e.preventDefault();
  const prev=ptrNotes[e.pointerId], n=getNoteAt(e.clientX,e.clientY);
  if (n!==prev) { if(prev) releaseKey(prev); if(n){ptrNotes[e.pointerId]=n; pressKey(n);} else delete ptrNotes[e.pointerId]; }
},{passive:false});
kbWrap.addEventListener('pointerup',e=>{ const n=ptrNotes[e.pointerId]; if(n){releaseKey(n); delete ptrNotes[e.pointerId];} });
kbWrap.addEventListener('pointercancel',e=>{ const n=ptrNotes[e.pointerId]; if(n){releaseKey(n); delete ptrNotes[e.pointerId];} });

// ── Visualizer ──────────────────────────────────────────────────
const visC=document.getElementById('vis-canvas'), visX=visC.getContext('2d');
function resizeVis(){ const el=document.getElementById('visualizer'); visC.width=el.clientWidth; visC.height=el.clientHeight; }
resizeVis(); window.addEventListener('resize',resizeVis);

(function visLoop(){
  requestAnimationFrame(visLoop);
  const w=visC.width,h=visC.height;
  visX.fillStyle='#1a1a1a'; visX.fillRect(0,0,w,h);
  if (!analyserNode) return;
  const data=new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteFrequencyData(data);
  const bars=32, bw=w/bars;
  for(let i=0;i<bars;i++){
    const v=data[Math.floor(i*data.length/bars)]/255;
    visX.fillStyle=`hsl(${25+i*3},80%,55%)`;
    visX.fillRect(i*bw+1,h-v*h,bw-2,v*h);
  }
})();
</script>
