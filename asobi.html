<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#241145" />
<meta name="format-detection" content="telephone=no" />
<title>おにさん ダンス！</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #241145;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: none;
    overscroll-behavior: none; position: fixed; inset: 0;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #start {
    position: absolute; inset: 0; z-index: 30;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px;
    background: radial-gradient(circle at 50% 38%, #6a3fb8, #241145 72%);
    color: #fff; text-align: center;
  }
  #start .oni { font-size: clamp(90px, 30vw, 180px); animation: wob 1.15s ease-in-out infinite; }
  @keyframes wob { 0%,100%{transform:rotate(-9deg) translateY(0)} 50%{transform:rotate(9deg) translateY(-14px)} }
  #start h1 { margin: 0; font-size: clamp(30px, 9vw, 54px); font-weight: 800; text-shadow: 0 3px 0 rgba(0,0,0,.3); }
  #start .btns { display: flex; flex-direction: column; gap: 16px; width: min(84vw, 360px); }
  #start .go {
    padding: 18px 32px; border: none; border-radius: 40px;
    font-family: inherit; font-size: clamp(20px, 5.6vw, 28px); font-weight: 800; color: #fff;
    box-shadow: 0 7px 0 rgba(0,0,0,.3), 0 12px 24px rgba(0,0,0,.35);
    touch-action: manipulation;
  }
  #start .go.dance { background: linear-gradient(160deg, #ff8fbf, #ff477e); animation: pulse 1.05s ease-in-out infinite; }
  #start .go.game  { background: linear-gradient(160deg, #7ad0ff, #3f8fe0); }
  #start .go .sub { display:block; font-size: .62em; font-weight: 700; opacity: .92; margin-top: 3px; }
  #start .go:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(0,0,0,.3); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  #back {
    position: absolute; top: max(12px, env(safe-area-inset-top));
    left: max(12px, env(safe-area-inset-left)); z-index: 20;
    width: 58px; height: 58px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.85); box-shadow: 0 4px 0 rgba(0,0,0,.2);
    font-size: 26px; display: none; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  #back.on { display: flex; }
  #back:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.2); }

  #over {
    position: absolute; inset: 0; z-index: 25; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: rgba(20,10,40,.72); color: #fff; text-align: center;
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  #over.on { display: flex; }
  #over .big { font-size: clamp(40px, 12vw, 68px); }
  #over h2 { margin: 0; font-size: clamp(26px, 7vw, 40px); font-weight: 800; }
  #over .score { font-size: clamp(20px, 5.5vw, 28px); font-weight: 800; }
  #over .best { font-size: clamp(15px, 4.4vw, 20px); opacity: .9; }
  #over .retry {
    margin-top: 8px; padding: 16px 34px; border: none; border-radius: 36px;
    font-family: inherit; font-size: clamp(20px, 5.4vw, 26px); font-weight: 800; color: #fff;
    background: linear-gradient(160deg, #ffd36b, #ff9f45);
    box-shadow: 0 6px 0 #c9781f; touch-action: manipulation;
  }
  #over .retry:active { transform: translateY(3px); box-shadow: 0 2px 0 #c9781f; }

  #music {
    position: absolute; top: max(12px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right)); z-index: 20;
    width: 58px; height: 58px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.85); box-shadow: 0 4px 0 rgba(0,0,0,.2);
    font-size: 28px; display: none; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  #music.on { display: flex; }
  #music:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.2); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <button id="music" aria-label="おんがく">🔊</button>
  <button id="back" aria-label="もどる">🏠</button>
  <div id="over">
    <div class="big">🎉</div>
    <h2>ゲーム おわり！</h2>
    <div class="score" id="overScore">スコア 0</div>
    <div class="best" id="overBest">ベスト 0</div>
    <button class="retry">▶ もういちど</button>
  </div>
  <div id="start">
    <div class="oni">👹</div>
    <h1>おにさん ダンス！</h1>
    <div class="btns">
      <button class="go dance" data-mode="dance">🕺 じゆうに おどる<span class="sub">3さい〜 タッチで あそぶ</span></button>
      <button class="go game" data-mode="game">🎮 キャッチ ゲーム<span class="sub">🍡をキャッチ！💣をよけろ</span></button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ================= iOS hardening ================= */
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("dblclick", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  document.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });
  var lastEnd = 0;
  document.addEventListener("touchend", function (e) {
    var n = Date.now(); if (n - lastEnd < 350) e.preventDefault(); lastEnd = n;
  }, { passive: false });

  /* ================= canvas ================= */
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.round(W * DPR); canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    layoutOnis();
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 200); });

  /* ================= audio ================= */
  var AC = window.AudioContext || window.webkitAudioContext;
  var actx = null, master = null, noiseBuf = null;
  function ensureAudio() {
    if (!actx && AC) {
      actx = new AC();
      master = actx.createGain(); master.gain.value = 0.85;
      master.connect(actx.destination);
      // white-noise buffer for hats / claps
      var n = actx.sampleRate * 0.4;
      noiseBuf = actx.createBuffer(1, n, actx.sampleRate);
      var d = noiseBuf.getChannelData(0);
      for (var i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    }
    if (actx && actx.state === "suspended") actx.resume();
    return actx;
  }
  function tone(freq, dur, type, vol, when, glideTo) {
    if (!actx) return;
    var t0 = actx.currentTime + (when || 0);
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t0);
    if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.25, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noiseHit(when, hp, dur, vol) {
    if (!actx || !noiseBuf) return;
    var t0 = actx.currentTime + (when || 0);
    var s = actx.createBufferSource(); s.buffer = noiseBuf;
    var f = actx.createBiquadFilter(); f.type = "highpass"; f.frequency.value = hp;
    var g = actx.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    s.connect(f); f.connect(g); g.connect(master);
    s.start(t0); s.stop(t0 + dur + 0.02);
  }
  function kick(when) {
    if (!actx) return;
    var t0 = actx.currentTime + (when || 0);
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(46, t0 + 0.13);
    g.gain.setValueAtTime(0.75, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.17);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + 0.19);
  }
  function cheer() {
    var s = [523, 659, 784, 1046, 1319];
    for (var i = 0; i < s.length; i++) tone(s[i], 0.28, "triangle", 0.3, i * 0.05);
    noiseHit(0.02, 6000, 0.5, 0.25);
  }
  function speak(t) {
    try {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(t);
      u.lang = "ja-JP"; u.rate = 0.95; u.pitch = 1.5;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  /* ================= music sequencer ================= */
  var bpm = 126, musicOn = true, musicStart = 0;
  // 16 eighth-notes (8 beats). Chords: C  Am  F  G (2 beats each)
  var melody = [659,0,784,1046, 880,0,659,880, 698,0,880,698, 784,0,587,784];
  var bassR  = [130.81,0,130.81,0, 110,0,110,0, 87.31,0,87.31,0, 98,0,98,0];
  var step = 0, nextTime = 0, timer = null;
  function scheduler() {
    if (!actx || !musicOn) return;
    var ahead = actx.currentTime + 0.14;
    var eighth = 30 / bpm;
    while (nextTime < ahead) {
      var w = nextTime - actx.currentTime;
      var beatIdx = (step / 2) | 0;
      if (step % 2 === 0) kick(w);                          // four-on-floor
      if (step % 2 === 0 && beatIdx % 2 === 1) noiseHit(w, 1800, 0.16, 0.35); // backbeat clap
      noiseHit(w, 9000, 0.03, step % 2 ? 0.10 : 0.05);      // hi-hat / shaker
      var m = melody[step % melody.length]; if (m) tone(m, 0.17, "square", 0.14, w);
      var b = bassR[step % bassR.length];   if (b) tone(b, 0.20, "triangle", 0.20, w);
      nextTime += eighth; step++;
    }
  }
  function startMusic() {
    if (!actx) return;
    musicStart = actx.currentTime;
    step = 0; nextTime = actx.currentTime + 0.06;
    if (timer) clearInterval(timer);
    timer = setInterval(scheduler, 25);
  }
  function stopMusic() { if (timer) { clearInterval(timer); timer = null; } }

  /* ================= particles ================= */
  var parts = [];
  var CONFETTI = ["#ff477e","#ffd34e","#7ed957","#4db6e6","#b07cff","#ff9f45","#ffffff"];
  function confetti(x, y, n, power) {
    n = n || 26; power = power || 8;
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, sp = power * (0.4 + Math.random());
      parts.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-3, life:1,
        decay:0.010+Math.random()*0.014, size:6+Math.random()*8,
        color:CONFETTI[(Math.random()*CONFETTI.length)|0], rot:Math.random()*6,
        vr:(Math.random()-0.5)*0.5, kind:"confetti", g:0.16 });
    }
  }
  function sparkle(x, y, n, spread, color) {
    n = n || 6;
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2, sp = (spread || 3) * (0.3 + Math.random());
      parts.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1, life:1,
        decay:0.03+Math.random()*0.03, size:3+Math.random()*4,
        color:color || "#fff", rot:0, vr:0, kind:"spark", g:0.05 });
    }
  }
  function dust(x, y, n) {
    for (var i = 0; i < (n||8); i++) {
      var a = -Math.PI + Math.random()*Math.PI, sp = 2+Math.random()*3;
      parts.push({ x:x, y:y, vx:Math.cos(a)*sp*1.6, vy:Math.sin(a)*sp*0.5, life:1,
        decay:0.04+Math.random()*0.03, size:6+Math.random()*8,
        color:"rgba(255,255,255,.5)", rot:0, vr:0, kind:"dust", g:0.02 });
    }
  }
  function updateParts(dt) {
    var k = dt * 60;
    for (var i = parts.length - 1; i >= 0; i--) {
      var p = parts[i];
      p.vy += p.g * k; p.vx *= Math.pow(0.99, k);
      p.x += p.vx * k; p.y += p.vy * k; p.rot += p.vr * k;
      p.life -= p.decay * k;
      if (p.life <= 0 || p.y > H + 60) parts.splice(i, 1);
    }
  }
  function drawParts() {
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      ctx.save(); ctx.globalAlpha = Math.max(p.life, 0);
      if (p.kind === "spark") {
        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
      } else if (p.kind === "dust") {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(0.6+p.life*0.6), 0, Math.PI*2); ctx.fill();
      } else {
        ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.55);
      }
      ctx.restore();
    }
  }

  /* ================= bokeh lights ================= */
  var bokeh = [];
  function initBokeh() {
    bokeh = [];
    var cols = ["#ff7ad9","#7ad9ff","#ffe27a","#b07cff","#7ed957"];
    for (var i = 0; i < 14; i++) {
      bokeh.push({ x:Math.random()*W, y:Math.random()*H, r:20+Math.random()*60,
        vy:-(6+Math.random()*14), a:0.05+Math.random()*0.10,
        col:cols[(Math.random()*cols.length)|0], ph:Math.random()*6 });
    }
  }
  function drawBokeh(t, dt) {
    ctx.globalCompositeOperation = "lighter";
    for (var i = 0; i < bokeh.length; i++) {
      var b = bokeh[i];
      b.y += b.vy * dt; b.x += Math.sin(t*0.5 + b.ph) * 0.3;
      if (b.y < -b.r) { b.y = H + b.r; b.x = Math.random()*W; }
      var g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      g.addColorStop(0, b.col); g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.globalAlpha = b.a * (0.7 + 0.3*Math.sin(t*2 + b.ph));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
  }

  /* ================= onis ================= */
  var RED  = { body:"#d83c28", dark:"#8f2114", light:"#ff6c4e", cheek:"#ff9a86", horn:"#efd6a0", hornDk:"#b99a63" };
  var BLUE = { body:"#3d6fd0", dark:"#22447f", light:"#6fa0ff", cheek:"#8fb6ff", horn:"#efd6a0", hornDk:"#b99a63" };
  var GREEN= { body:"#37a35d", dark:"#1f6b3c", light:"#66d78d", cheek:"#9be3b3", horn:"#efd6a0", hornDk:"#b99a63" };
  var onis = [];
  function newOni(x, y, scale, theme, phase, main) {
    return { x:x, y:y, scale:scale, theme:theme, phase:phase, main:main, trick:-10,
      head:{x:0,v:0}, hair:{x:0,v:0}, arm:{x:0,v:0}, blink:1+Math.random()*3, blinking:0 };
  }
  function layoutOnis() {
    if (onis.length === 0) {
      onis.push(newOni(W*0.5,  H*0.56, 1.0, RED,   0.0, true));
      onis.push(newOni(W*0.20, H*0.72, 0.62, BLUE,  1.0, false));
      onis.push(newOni(W*0.80, H*0.72, 0.62, GREEN, 2.0, false));
    } else {
      var m = onis[0];
      m.x = Math.max(90, Math.min(W-90, m.x));
      m.y = Math.max(150, Math.min(H-60, m.y));
      onis[1].x = W*0.18; onis[1].y = H*0.74;
      onis[2].x = W*0.82; onis[2].y = H*0.74;
    }
    initBokeh();
  }
  function nowClock() { return actx ? actx.currentTime - musicStart : performance.now()/1000; }

  // spring integrator (lag + overshoot = liveliness)
  function spring(s, target, stiff, damp, dt) {
    s.v += (target - s.x) * stiff * dt;
    s.v *= Math.exp(-damp * dt);
    s.x += s.v * dt;
    return s.x;
  }
  var TAU = Math.PI * 2;

  function stroke2(pts, w, color) {
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
  }
  // 3D-shaded capsule limb: core-shadow underside + rim highlight + specular streak
  function limb3d(pts, w, th) {
    var dn = [], up = [], up2 = [];
    for (var i = 0; i < pts.length; i++) {
      dn.push([pts[i][0] + 2.5, pts[i][1] + 3]);
      up.push([pts[i][0] - w * 0.18, pts[i][1] - w * 0.22]);
      up2.push([pts[i][0] - w * 0.24, pts[i][1] - w * 0.30]);
    }
    stroke2(dn, w, th.dark);            // shadow underside
    stroke2(pts, w * 0.92, th.body);    // body
    ctx.globalAlpha = 0.55; stroke2(up, w * 0.34, th.light);   // rim light
    ctx.globalAlpha = 0.45; stroke2(up2, w * 0.12, "#ffffff"); // specular
    ctx.globalAlpha = 1;
  }
  // shaded sphere (top-left key light)
  function ball(cx, cy, r, th) {
    var g = ctx.createRadialGradient(cx - r * 0.36, cy - r * 0.42, r * 0.1, cx + r * 0.12, cy + r * 0.14, r * 1.1);
    g.addColorStop(0, th.light); g.addColorStop(0.5, th.body); g.addColorStop(1, th.dark);
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();
  }
  // crab-claw pincer hand (エビカニ) — two shaded jaws that open/close
  function claw(hx, hy, dir, open, th) {
    ctx.save();
    ctx.translate(hx, hy); ctx.rotate(dir);
    var sp = 0.14 + open * 0.5;
    for (var s = -1; s <= 1; s += 2) {
      ctx.save(); ctx.rotate(s * sp);
      var g = ctx.createLinearGradient(0, s * 9, 34, 0);
      g.addColorStop(0, th.dark); g.addColorStop(0.5, th.body); g.addColorStop(1, th.light);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(2, s * 8); ctx.quadraticCurveTo(30, s * 12, 35, 0); ctx.quadraticCurveTo(22, s * 3, 4, s * 3);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.35)";
      ctx.beginPath(); ctx.moveTo(6, s * 5); ctx.quadraticCurveTo(22, s * 7, 27, s * 1); ctx.quadraticCurveTo(18, s * 3, 8, s * 3); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ball(-2, 0, 10, th); // wrist knuckle
    ctx.restore();
  }
  // shaded arm shoulder→hand with a natural elbow bend
  function drawArm(S, sh, hand, bend, th) {
    var mx = (sh[0] + hand[0]) / 2 + S * bend;
    var my = (sh[1] + hand[1]) / 2 + Math.abs(bend) * 0.3 + 6;
    limb3d([sh, [mx, my]], 16, th);
    limb3d([[mx, my], hand], 12, th);
    ball(sh[0], sh[1], 10, th); // deltoid
  }

  // breakdance specials
  var SPECIALS = ["spin", "windmill", "headspin", "freeze"];
  function setSpecial(o, t, type) {
    var ty = type || SPECIALS[(Math.random() * SPECIALS.length) | 0];
    o.special = { type: ty, t0: t, dur: ty === "spin" ? 0.72 : ty === "freeze" ? 0.95 : 1.15 };
  }

  function drawOni(o, t, dt) {
    var th = o.theme;
    if (o.showT == null) o.showT = t + 4 + Math.random() * 6;
    var beat = t * bpm / 60 + o.phase;
    var ph = beat - Math.floor(beat);
    var air = Math.sin(ph * Math.PI);
    var comp = Math.pow(Math.cos(ph * Math.PI), 6);
    var sway = Math.sin(beat * Math.PI);
    var floatY = Math.sin(t * 1.5 + o.phase) * 3;

    /* ---- auto breakdance show-off (dance mode / friends) ---- */
    var canAuto = (mode === "dance") || (!o.main);
    if (canAuto && !o.special && t > o.showT) {
      setSpecial(o, t);
      o.showT = t + (o.main ? 5 + Math.random() * 5 : 7 + Math.random() * 8);
      sparkle(o.x, o.y + 90 * o.scale, 6, 4, "rgba(255,220,150,1)");
    }

    /* ---- breakdance special pose ---- */

    for (var i = 0; i < game.items.length; i++) {
      var it = game.items[i];
      ctx.save(); ctx.translate(it.x, it.y); ctx.rotate(Math.sin(it.rot + it.wob) * 0.18);
      ctx.font = (it.r * 2) + "px serif";
      if (!it.bad) { ctx.shadowColor = "rgba(255,220,120,.9)"; ctx.shadowBlur = 12; }
      ctx.fillText(it.emoji, 0, 0);
      ctx.restore();
    }
    ctx.shadowBlur = 0;
  }
  function drawHUD() {
    ctx.save();
    ctx.textBaseline = "top"; ctx.textAlign = "left";
    ctx.font = "800 26px system-ui, sans-serif";
    ctx.fillStyle = "rgba(0,0,0,.35)"; ctx.fillText("⭐ " + game.score, 18, 76);
    ctx.fillStyle = "#fff"; ctx.fillText("⭐ " + game.score, 16, 74);
    ctx.font = "700 15px system-ui, sans-serif"; ctx.fillStyle = "rgba(255,255,255,.82)";
    ctx.fillText("ベスト " + Math.max(game.best, game.score), 18, 104);
    // lives
    ctx.textAlign = "right"; ctx.font = "20px serif";
    var hs = ""; for (var i = 0; i < 3; i++) hs += (i < game.lives ? "❤️" : "🖤");
    ctx.fillText(hs, W - 82, 80);
    // combo
    if (game.combo >= 2) {
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      var mult = 1 + Math.floor(game.combo / 5);
      ctx.font = "800 30px system-ui, sans-serif";
      ctx.fillStyle = "rgba(0,0,0,.3)"; ctx.fillText(game.combo + " コンボ！", W / 2 + 2, 150);
      ctx.fillStyle = "#ffe27a"; ctx.fillText(game.combo + " コンボ！", W / 2, 148);
      if (mult > 1) { ctx.font = "800 20px system-ui, sans-serif"; ctx.fillStyle = "#7ef0a0"; ctx.fillText("×" + mult + " とくてん", W / 2, 176); }
    }
    ctx.restore();
  }
  function endGame() {
    game.over = true;
    if (game.score > game.best) { game.best = game.score; try { localStorage.setItem("oni_best", "" + game.best); } catch (e) {} }
    overScore.textContent = "スコア " + game.score;
    overBest.textContent = "ベスト " + game.best;
    overEl.classList.add("on"); cheer();
  }

  /* ================= main loop ================= */
  var running = false, lastT = 0, lastBeat = 0;
  function loop() {
    var t = nowClock();
    var dt = Math.min(0.05, Math.max(0.001, t - lastT)); lastT = t;

    // beat crossing → floor pulse + foot sparkles (visual sync to kick)
    var bt = t * bpm / 60;
    if (Math.floor(bt) > Math.floor(lastBeat)) {
      floorPulse = 1;
      for (var i = 0; i < onis.length; i++) {
        var o = onis[i];
        sparkle(o.x, o.y + 96 * o.scale, 4, 3, "rgba(255,220,150,1)");
      }
    }
    lastBeat = bt;
    floorPulse = Math.max(0, floorPulse - dt * 3.5);

    if (mode === "game") updateGame(t, dt);

    ctx.clearRect(0, 0, W, H);
    drawBg(t, dt);

    // shake only the actors (not the bg) on bomb hits
    var shx = 0, shy = 0;
    if (mode === "game" && game.shake > 0) {
      var s = game.shake * 14; shx = (Math.random() - 0.5) * s; shy = (Math.random() - 0.5) * s;
    }
    ctx.save(); ctx.translate(shx, shy);

    var order = onis.slice().sort(function (a, b) {
      if (a.main !== b.main) return a.main ? 1 : -1;
      return a.y - b.y;
    });
    for (var j = 0; j < order.length; j++) drawOni(order[j], t, dt);

    if (mode === "game") drawItems();
    updateParts(dt); drawParts();
    ctx.restore();

    if (mode === "game") {
      if (game.flash > 0) {
        ctx.fillStyle = "rgba(255,40,40," + (game.flash * 0.45) + ")";
        ctx.fillRect(0, 0, W, H);
      }
      drawHUD();
    }
    requestAnimationFrame(loop);
  }

  /* ================= interaction ================= */
  var drag = null;
  function getPts(e) {
    var out = [];
    var list = e.touches && e.touches.length ? e.touches : (e.changedTouches || [e]);
    for (var i = 0; i < list.length; i++) out.push({ x: list[i].clientX, y: list[i].clientY });
    return out;
  }
  function hitOni(x, y) {
    for (var i = 0; i < onis.length; i++) {
      var o = onis[i];
      var dx = x - o.x, dy = y - (o.y - 40 * o.scale), r = 100 * o.scale;
      if (dx * dx + dy * dy <= r * r) return o;
    }
    return null;
  }
  function doTrick(o, x, y) {
    setSpecial(o, nowClock());
    o.showT = nowClock() + 5 + Math.random() * 5;
    confetti(x, y, 24, 9); dust(o.x, o.y + 96 * o.scale, 10); cheer();
    if (Math.random() < 0.45) speak("わーい");
  }
  function moveMainTo(p) {
    var m = onis[0];
    m.x = Math.max(60, Math.min(W - 60, p.x));
    m.y = Math.max(H * 0.34, Math.min(H - 40, p.y + 18));
    if (Math.random() < 0.25) sparkle(p.x, p.y, 1, 1, "#fff");
  }
  function onDown(e) {
    if (!running) return; e.preventDefault();
    var p = getPts(e)[0];
    if (mode === "game") { if (game.over) return; drag = { game:true }; moveMainTo(p); return; }
    var o = hitOni(p.x, p.y);
    if (o) drag = { oni:o, moved:false, offx:p.x - o.x, offy:p.y - o.y };
    else { confetti(p.x, p.y, 20, 8); for (var i=0;i<onis.length;i++) doTrick(onis[i], onis[i].x, onis[i].y-30); }
  }
  function onMove(e) {
    if (!running || !drag) return; e.preventDefault();
    var p = getPts(e)[0];
    if (drag.game) { moveMainTo(p); return; }
    var nx = p.x - drag.offx, ny = p.y - drag.offy;
    if (Math.abs(nx - drag.oni.x) > 3 || Math.abs(ny - drag.oni.y) > 3) drag.moved = true;
    drag.oni.x = Math.max(80, Math.min(W - 80, nx));
    drag.oni.y = Math.max(150, Math.min(H - 40, ny));
    if (Math.random() < 0.3) sparkle(p.x, p.y, 2, 2, "#fff");
  }
  function onUp() {
    if (!running) return;
    if (drag && !drag.game && !drag.moved) doTrick(drag.oni, drag.oni.x, drag.oni.y - 40);
    drag = null;
  }
  canvas.addEventListener("touchstart", onDown, { passive: false });
  canvas.addEventListener("touchmove", onMove, { passive: false });
  canvas.addEventListener("touchend", onUp, { passive: false });
  canvas.addEventListener("touchcancel", onUp, { passive: false });
  canvas.addEventListener("mousedown", function (e) { onDown(e); });
  canvas.addEventListener("mousemove", function (e) { if (e.buttons & 1) onMove(e); });
  canvas.addEventListener("mouseup", onUp);

  /* ================= start / music / navigation ================= */
  var startEl = document.getElementById("start");
  var musicBtn = document.getElementById("music");
  var backBtn = document.getElementById("back");
  var overEl = document.getElementById("over");
  var overScore = document.getElementById("overScore");
  var overBest = document.getElementById("overBest");
  var retryBtn = document.querySelector("#over .retry");

  function begin(m) {
    ensureAudio(); startMusic();
    startEl.style.display = "none"; musicBtn.classList.add("on"); backBtn.classList.add("on");
    if (!running) { running = true; lastT = nowClock(); lastBeat = lastT * bpm / 60; loop(); }
    if (m === "game") {
      startGameMode();
    } else {
      mode = "dance"; game.over = false; overEl.classList.remove("on");
      confetti(W / 2, H / 2, 40, 10);
      for (var i = 0; i < onis.length; i++) setSpecial(onis[i], nowClock() + i * 0.12, "spin");
    }
  }
  function goHome() {
    mode = "dance"; game.over = false; game.items.length = 0;
    overEl.classList.remove("on"); backBtn.classList.remove("on");
    startEl.style.display = "flex";
  }
  function bind(el, fn) {
    if (!el) return;
    el.addEventListener("touchstart", function (e) { e.preventDefault(); fn(); }, { passive: false });
    el.addEventListener("click", function (e) { e.preventDefault(); fn(); });
  }
  Array.prototype.forEach.call(document.querySelectorAll("#start .go"), function (b) {
    bind(b, function () { begin(b.getAttribute("data-mode")); });
  });
  bind(retryBtn, function () { begin("game"); });
  bind(backBtn, goHome);

  var mGo = function (e) {
    e.preventDefault(); musicOn = !musicOn;
    musicBtn.textContent = musicOn ? "🔊" : "🔇";
    if (musicOn) { musicStart = actx.currentTime; startMusic(); } else stopMusic();
  };
  musicBtn.addEventListener("touchstart", mGo, { passive: false });
  musicBtn.addEventListener("click", mGo);

  resize();
})();
</script>
</body>
</html>
